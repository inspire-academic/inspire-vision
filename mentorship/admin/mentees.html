<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspire Mentorship | Manage Mentees</title>
  <meta name="description" content="Every mentee, with their assignment status.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/mentorship/css/mentorship.css">
  <style>
    body.admin-body {
      background: var(--mentorship-navy);
      color: #f4f6f9;
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .admin-wrap { max-width: 760px; margin: 0 auto }
    .mn-controls { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
    .mn-search {
      flex: 1; min-width: 200px;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.13);
      border-radius: 10px; padding: 10px 14px; font-size: 13px; color: #f4f6f9; font-family: inherit;
    }
    .mn-filter-btn {
      padding: 7px 14px; border-radius: 999px; font-size: 12px; font-weight: 700;
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.12); color: rgba(244,246,249,.75);
      cursor: pointer; white-space: nowrap;
    }
    .mn-filter-btn.active { background: var(--mentorship-gold); color: #fff; border-color: var(--mentorship-gold); }
    .mn-card {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 16px;
      padding: 16px 20px;
      margin-bottom: 10px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .mn-name { font-weight: 700; font-size: 15px }
    .mn-email { font-size: 12px; opacity: .6 }
    .mn-meta { font-size: 12px; opacity: .5; margin-top: 2px }
    .mn-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 999px; white-space: nowrap; }
    .mn-badge-assigned { background: rgba(34,197,94,.15); color: #86efac; }
    .mn-badge-unassigned { background: rgba(255,255,255,.08); color: rgba(244,246,249,.6); }
  </style>
</head>
<body class="admin-body">
  <div class="admin-wrap">
    <div class="page-header">
      <div>
        <div class="page-eyebrow">Admin</div>
        <h1 class="page-title">Manage Mentees</h1>
      </div>
    </div>
    <div class="mn-controls">
      <input type="text" class="mn-search" id="search" placeholder="Search by name or email…">
      <button class="mn-filter-btn active" data-filter="all">All</button>
      <button class="mn-filter-btn" data-filter="assigned">Assigned</button>
      <button class="mn-filter-btn" data-filter="unassigned">Unassigned</button>
    </div>
    <div id="content">
      <div class="empty-state"><div class="empty-state-icon">⏳</div>Checking access…</div>
    </div>
  </div>

  <script src="/assets/supabase.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const escapeHtml = s => { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };

    let allMentees = [];
    let currentFilter = 'all';
    let searchTerm = '';

    function render() {
      const content = $('content');
      let rows = allMentees;
      if (currentFilter === 'assigned') rows = rows.filter(m => m.mentor_name);
      if (currentFilter === 'unassigned') rows = rows.filter(m => !m.mentor_name);
      if (searchTerm) {
        const q = searchTerm.toLowerCase();
        rows = rows.filter(m => (m.full_name || '').toLowerCase().includes(q) || (m.email || '').toLowerCase().includes(q));
      }
      if (!rows.length) {
        content.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🤷</div>No mentees match this view.</div>';
        return;
      }
      content.innerHTML = rows.map(m => {
        const joined = new Date(m.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
        return `
          <div class="mn-card">
            <div>
              <div class="mn-name">${escapeHtml(m.full_name || 'No name given')}</div>
              <div class="mn-email">${escapeHtml(m.email)}</div>
              <div class="mn-meta">${m.mentor_name ? `Mentor: ${escapeHtml(m.mentor_name)}` : 'Not yet assigned'} · Joined ${joined}</div>
            </div>
            <span class="mn-badge ${m.mentor_name ? 'mn-badge-assigned' : 'mn-badge-unassigned'}">${m.mentor_name ? 'Assigned' : 'Unassigned'}</span>
          </div>`;
      }).join('');
    }

    document.querySelectorAll('.mn-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.mn-filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        render();
      });
    });
    $('search').addEventListener('input', (e) => { searchTerm = e.target.value.trim(); render(); });

    (async () => {
      const content = $('content');
      try {
        const db = await getDB();
        const { data: { session } } = await db.auth.getSession();
        if (!session) { window.location.href = '/mentorship/login.html'; return; }

        const res = await fetch('/.netlify/functions/admin-matching', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${session.access_token}` },
          body: JSON.stringify({ action: 'list' }),
        });
        const data = await res.json().catch(() => ({}));
        if (res.status === 401) { window.location.href = '/mentorship/login.html'; return; }
        if (res.status === 403) {
          content.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔒</div>You\'re not authorized to view this page.</div>';
          return;
        }
        if (res.status !== 200) {
          content.innerHTML = `<div class="empty-state"><div class="empty-state-icon">⚠️</div>${escapeHtml(data.error || 'Something went wrong loading mentees.')}</div>`;
          return;
        }
        allMentees = data.allMentees || [];
        render();
      } catch (e) {
        console.warn('Mentees admin page failed:', e);
        content.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div>Something went wrong — please try again.</div>';
      }
    })();
  </script>
</body>
</html>
