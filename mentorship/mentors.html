<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspire Mentorship | Become a Mentor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/mentorship/css/mentorship.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-eyebrow">Inspire Mentorship</div>
    <div class="auth-title">Become a Mentor</div>
    <div class="auth-sub">Use your gifts and experience to guide the next generation. Every mentor application is reviewed before you're matched with a mentee — this keeps our young people safe.</div>

    <div class="auth-msg" id="authMsg"></div>

    <form id="mentorForm">
      <div class="auth-field">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" name="fullName" required autocomplete="name">
      </div>
      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label for="motivation">Why do you want to mentor?</label>
        <textarea id="motivation" name="motivation" required placeholder="Tell us a little about yourself and why you'd like to mentor a young person."></textarea>
      </div>
      <label class="auth-check">
        <input type="checkbox" id="safeguarding" required>
        <span>I understand this role involves working with young people and requires a safeguarding review (which may include a background check) before I'm matched with a mentee.</span>
      </label>
      <button type="submit" class="auth-btn" id="submitBtn">Submit Application</button>
    </form>

    <div class="auth-footer">
      Already applied? <a href="/mentorship/login.html">Sign in</a>
    </div>
  </div>

  <script src="/assets/supabase.js"></script>
  <script>
    const form = document.getElementById('mentorForm');
    const msg = document.getElementById('authMsg');
    const btn = document.getElementById('submitBtn');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'auth-msg show ' + type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        showMsg("Passwords don't match.", 'error');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Submitting…';
      msg.className = 'auth-msg';
      try {
        const db = await getDB();
        const { data, error } = await db.auth.signUp({
          email: document.getElementById('email').value.trim(),
          password,
          options: {
            data: {
              full_name: document.getElementById('fullName').value.trim(),
              mentorship_role: 'mentor',
              mentor_status: 'pending_review',
              mentor_motivation: document.getElementById('motivation').value.trim(),
            },
          },
        });
        if (error) {
          showMsg(error.message || 'Could not submit your application — please try again.', 'error');
          btn.disabled = false;
          btn.textContent = 'Submit Application';
          return;
        }
        // Mentor accounts never auto-redirect into mentor-portal — pending
        // review regardless of whether email confirmation is also required.
        form.style.display = 'none';
        showMsg("Thank you! Your application is under review — we'll email you once it's approved. This usually takes a few days.", 'success');
      } catch (e) {
        console.warn('Mentor application failed:', e);
        showMsg('Something went wrong — please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Submit Application';
      }
    });
  </script>
</body>
</html>
