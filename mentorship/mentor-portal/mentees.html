<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspire Mentorship | My Mentees</title>
  <meta name="description" content="The students you're currently walking alongside.">
  <meta name="theme-color" content="#0A1628">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700;9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/mentorship/css/mentorship.css">
</head>
<body>
<div class="app">
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside class="sidebar" id="sidebar">
    <a class="sidebar-brand" href="https://www.inspirevision.org" title="Go to Inspire Vision">
      <div class="brand-shield">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L4 5v6c0 5.25 3.5 10.15 8 11.35C16.5 21.15 20 16.25 20 11V5L12 2z"/>
        </svg>
      </div>
      <div>
        <div class="brand-text-top">Inspire</div>
        <div class="brand-text-sub">Mentor Portal</div>
      </div>
    </a>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Mentoring</div>
      <a class="nav-item" href="/mentorship/mentor-portal/">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 10.5l9-7 9 7"/><path d="M5 9.5V21h14V9.5"/><path d="M9 21v-7h6v7"/></svg>
        Dashboard
      </a>
      <a class="nav-item active" href="/mentorship/mentor-portal/mentees.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        My Mentees
      </a>
      <a class="nav-item" href="/mentorship/mentor-portal/session-notes.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Session Notes
      </a>
      <a class="nav-item" href="/mentorship/mentor-portal/resources.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5z"/></svg>
        Resources
      </a>
    </nav>
    <div class="sidebar-cta">
      <div class="sidebar-cta-bg"></div>
      <div class="sidebar-cta-content">
        <div class="sidebar-cta-eyebrow">Thank you.</div>
        <div class="sidebar-cta-title">What you're<br>giving matters<br>more than you know.</div>
        <div class="sidebar-cta-sig">Inspire.</div>
      </div>
    </div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="topbar-menu" id="topbarMenu" aria-label="Open menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
      </button>
      <div class="topbar-welcome">
        <div class="topbar-greeting" id="topbarGreeting">Welcome back 👋</div>
        <div class="topbar-sub">Every mentee here chose to show up. So did you.</div>
      </div>
      <button class="topbar-theme-toggle" id="themeToggle" aria-label="Toggle theme" title="Toggle light / dark">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <div class="topbar-dropdown-wrap">
        <button class="topbar-avatar" id="topbarAvatar" aria-label="Account menu">·</button>
        <div class="topbar-dropdown" id="profileDropdown">
          <div class="topbar-dropdown-title" id="profileDropdownName">Account</div>
          <button class="topbar-dropdown-item" id="signOutBtn">Sign out</button>
        </div>
      </div>
    </header>

    <div class="content">

      <div class="page-header">
        <div>
          <div class="page-eyebrow">Mentoring</div>
          <h1 class="page-title">My Mentees</h1>
        </div>
      </div>

      <div id="menteesList">
        <div class="empty-state"><div class="empty-state-icon">⏳</div>Loading…</div>
      </div>
    </div>
  </main>
</div>

<script>
  const sidebarEl = document.getElementById('sidebar');
  const backdropEl = document.getElementById('sidebarBackdrop');
  function closeDrawer() { sidebarEl?.classList.remove('mobile-open'); backdropEl?.classList.remove('show'); }
  function openDrawer()  { sidebarEl?.classList.add('mobile-open'); backdropEl?.classList.add('show'); }
  document.getElementById('topbarMenu')?.addEventListener('click', () => {
    sidebarEl?.classList.contains('mobile-open') ? closeDrawer() : openDrawer();
  });
  backdropEl?.addEventListener('click', closeDrawer);
  document.querySelectorAll('.nav-item').forEach(item => { item.addEventListener('click', closeDrawer); });

  const profileDropdown = document.getElementById('profileDropdown');
  document.getElementById('topbarAvatar')?.addEventListener('click', (e) => {
    e.stopPropagation();
    profileDropdown?.classList.toggle('show');
  });
  document.addEventListener('click', () => { profileDropdown?.classList.remove('show'); });
  document.getElementById('signOutBtn')?.addEventListener('click', async () => {
    try {
      const db = await getDB();
      await db.auth.signOut();
    } catch (e) { console.warn('Sign out failed:', e); }
    window.location.href = 'https://www.inspirevision.org';
  });
</script>

<script>
  (function () {
    const html = document.documentElement;
    const btn = document.getElementById('themeToggle');
    const saved = localStorage.getItem('iv-theme');
    if (saved) html.setAttribute('data-theme', saved);
    btn?.addEventListener('click', () => {
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('iv-theme', next);
    });
  })();
</script>
<script src="/assets/supabase.js"></script>
<script>
  const $ = id => document.getElementById(id);
  const escapeHtml = s => { const d = document.createElement('div'); d.textContent = s ?? ''; return d.innerHTML; };

  function renderMentees(rows) {
    const list = $('menteesList');
    if (!rows.length) {
      list.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🤝</div>No mentees assigned yet — check back once our team pairs you with someone.</div>';
      return;
    }
    list.innerHTML = rows.map(r => `
      <div class="list-card">
        <div class="list-card-top">
          <div class="list-card-title">${escapeHtml(r.student_name)}</div>
          <span class="badge badge-muted">Active</span>
        </div>
        <div class="list-card-meta">Paired ${new Date(r.assigned_at).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}</div>
        <div class="list-card-actions">
          <a class="list-card-btn primary" href="/mentorship/mentor-portal/session-notes.html?student=${r.student_id}">Session Notes</a>
        </div>
      </div>`).join('');
  }

  let dbClient = null;
  let currentUser = null;
  (async () => {
    try {
      dbClient = await getDB();
      const { data: { user } } = await dbClient.auth.getUser();
      const isApprovedMentor = user?.user_metadata?.mentorship_role === 'mentor' && user?.user_metadata?.mentor_status === 'approved';
      if (!user || !isApprovedMentor) { window.location.href = '/mentorship/login.html'; return; }
      currentUser = user;
      const firstWord = s => (s || '').trim().split(/\s+/)[0] || '';
      const firstName = firstWord(user.user_metadata?.full_name) || 'Mentor';
      $('topbarGreeting').textContent = `Welcome back, ${firstName} 👋`;
      $('profileDropdownName').textContent = firstName;
      const avatarEl = $('topbarAvatar');
      const avatarUrl = user.user_metadata?.avatar_url;
      if (avatarUrl) { avatarEl.style.backgroundImage = `url('${avatarUrl}')`; avatarEl.style.backgroundSize = 'cover'; avatarEl.textContent = ''; }
      else avatarEl.textContent = firstName[0]?.toUpperCase() || '?';

      const { data, error } = await dbClient.schema('mentorship').from('mentor_assignments')
        .select('*').eq('mentor_id', currentUser.id).eq('status', 'active').order('assigned_at', { ascending: false });
      if (error) { console.warn('Load mentees failed:', error); renderMentees([]); return; }
      renderMentees(data || []);

    } catch (e) {
      console.warn('Mentor portal page init failed:', e);
      window.location.href = '/mentorship/login.html';
    }
  })();

</script>
</body>
</html>
