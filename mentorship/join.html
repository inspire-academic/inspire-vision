<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspire Mentorship | Become a Mentee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/mentorship/css/mentorship.css">
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-eyebrow">Inspire Mentorship</div>
    <div class="auth-title">Become a Mentee</div>
    <div class="auth-sub">Start your journey — build character, resilience and purpose with a mentor who walks with you.</div>

    <div class="auth-msg" id="authMsg"></div>

    <form id="joinForm">
      <div class="auth-field">
        <label for="fullName">Full name</label>
        <input type="text" id="fullName" name="fullName" required autocomplete="name">
      </div>
      <div class="auth-field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required autocomplete="email">
      </div>
      <div class="auth-field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required minlength="8" autocomplete="new-password">
      </div>
      <div class="auth-field">
        <label for="confirmPassword">Confirm password</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" autocomplete="new-password">
      </div>
      <label class="auth-check">
        <input type="checkbox" id="terms" required>
        <span>I agree to be contacted about my mentorship journey and understand a parent/guardian may be involved if I'm under 18.</span>
      </label>
      <button type="submit" class="auth-btn" id="submitBtn">Create My Account</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="/mentorship/login.html">Sign in</a>
    </div>
  </div>

  <script src="/assets/supabase.js"></script>
  <script>
    const form = document.getElementById('joinForm');
    const msg = document.getElementById('authMsg');
    const btn = document.getElementById('submitBtn');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = 'auth-msg show ' + type;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        showMsg("Passwords don't match.", 'error');
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Creating account…';
      msg.className = 'auth-msg';
      try {
        const db = await getDB();
        const { data, error } = await db.auth.signUp({
          email: document.getElementById('email').value.trim(),
          password,
          options: {
            data: {
              full_name: document.getElementById('fullName').value.trim(),
              mentorship_role: 'mentee',
            },
          },
        });
        if (error) {
          showMsg(error.message || 'Could not create your account — please try again.', 'error');
          btn.disabled = false;
          btn.textContent = 'Create My Account';
          return;
        }
        if (data.session) {
          // Email confirmation is off for this project — straight in.
          window.location.href = '/mentorship/onboarding/welcome.html';
        } else {
          showMsg("Account created! Check your email to confirm it, then sign in.", 'success');
          form.reset();
          btn.textContent = 'Create My Account';
        }
      } catch (e) {
        console.warn('Signup failed:', e);
        showMsg('Something went wrong — please try again.', 'error');
        btn.disabled = false;
        btn.textContent = 'Create My Account';
      }
    });
  </script>
</body>
</html>
