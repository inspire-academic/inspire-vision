<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inspire Mentorship | Know Me</title>
  <meta name="description" content="Tell your mentor a little about yourself.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/tokens.css">
  <link rel="stylesheet" href="/assets/styles.css">
  <link rel="stylesheet" href="/mentorship/css/mentorship.css">
</head>
<body class="auth-body">
  <div class="auth-card onboard-card">
    <div class="onboard-steps">
      <span class="done"></span><span class="active"></span><span></span><span></span><span></span>
    </div>
    <div class="auth-eyebrow">Step 2 of 5</div>
    <div class="auth-title">Know Me</div>
    <div class="auth-sub">A little context helps your mentor meet you where you are.</div>

    <div class="auth-msg" id="msg"></div>

    <form id="knowMeForm">
      <div class="auth-field">
        <label for="school">School / year group <span style="font-weight:400; opacity:.6">(optional)</span></label>
        <input type="text" id="school" placeholder="e.g. Kings College, Year 11">
      </div>
      <div class="auth-field">
        <label for="reason">What brings you to mentorship?</label>
        <select id="reason">
          <option value="">Prefer not to say</option>
          <option value="confidence">Building confidence</option>
          <option value="direction">Finding direction / purpose</option>
          <option value="someone_to_talk_to">Someone to talk to</option>
          <option value="faith">Growing in faith</option>
          <option value="academic">Academic and life balance</option>
          <option value="all">A bit of everything</option>
        </select>
      </div>
      <div class="auth-field">
        <label for="about">Anything else you'd like your mentor to know? <span style="font-weight:400; opacity:.6">(optional)</span></label>
        <textarea id="about" placeholder="Share as much or as little as you like."></textarea>
      </div>
      <button type="submit" class="auth-btn" id="submitBtn">Continue</button>
    </form>
    <a href="/mentorship/onboarding/strengths.html" class="onboard-skip">Skip this step</a>
  </div>

  <script src="/assets/supabase.js"></script>
  <script>
    let dbClient = null;
    (async () => {
      try {
        dbClient = await getDB();
        const { data: { user } } = await dbClient.auth.getUser();
        if (!user) { window.location.href = '/mentorship/login.html'; return; }
      } catch (e) {
        console.warn('Know Me auth check failed:', e);
        window.location.href = '/mentorship/login.html';
      }
    })();

    document.getElementById('knowMeForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const msg = document.getElementById('msg');
      btn.disabled = true; btn.textContent = 'Saving…';
      try {
        const { error } = await dbClient.auth.updateUser({
          data: {
            school: document.getElementById('school').value.trim(),
            mentorship_reason: document.getElementById('reason').value,
            about_me: document.getElementById('about').value.trim(),
          },
        });
        if (error) {
          msg.textContent = error.message || 'Could not save — please try again.';
          msg.className = 'auth-msg show error';
          btn.disabled = false; btn.textContent = 'Continue';
          return;
        }
        window.location.href = '/mentorship/onboarding/strengths.html';
      } catch (err) {
        console.warn('Know Me save failed:', err);
        msg.textContent = 'Something went wrong — please try again.';
        msg.className = 'auth-msg show error';
        btn.disabled = false; btn.textContent = 'Continue';
      }
    });
  </script>
</body>
</html>
